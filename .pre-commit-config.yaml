repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-json
        # Placeholder / pseudo-JSON guides, not valid JSON (see HealthGPS examples/config_skeleton.json pattern).
        exclude: ^.*config_skeleton\.json$
      - id: check-yaml
      - id: trailing-whitespace
      - id: end-of-file-fixer
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: '\.(json|yaml|yml)$'
        exclude: ^.*config_skeleton\.json$
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: ["--disable", "MD013", "MD041", "--"]
